services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: quantagent-api:local
    command: ["sh", "-c", "APP_ENV=${APP_ENV:-local} exec uvicorn quantagent.api.main:app --host 0.0.0.0 --port 8000"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql+psycopg://quantagent:quantagent@db:5432/quantagent}
      RUNTIME_DIR: ${COMPOSE_RUNTIME_DIR:-/app/runtime}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-memory}
      EVENT_BUS_KAFKA_BOOTSTRAP_SERVERS: ${COMPOSE_EVENT_BUS_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      EVENT_BUS_KAFKA_CLIENT_ID: ${EVENT_BUS_KAFKA_CLIENT_ID:-quantagent-local}
      EVENT_BUS_KAFKA_DEFAULT_GROUP_ID: ${EVENT_BUS_KAFKA_DEFAULT_GROUP_ID:-quantagent-worker}
      EVENT_BUS_TOPIC_PREFIX: ${EVENT_BUS_TOPIC_PREFIX:-}
      MODEL_CONFIG_ENCRYPTION_KEY: ${MODEL_CONFIG_ENCRYPTION_KEY:-}
      AUTH_ENABLED: ${AUTH_ENABLED:-true}
      AUTH_ADMIN_PASSWORD: ${AUTH_ADMIN_PASSWORD:-}
      AUTH_SESSION_SECRET: ${AUTH_SESSION_SECRET:-}
      AUTH_SESSION_LIFETIME_SECONDS: ${AUTH_SESSION_LIFETIME_SECONDS:-43200}
      AUTH_SESSION_ABSOLUTE_LIFETIME_SECONDS: ${AUTH_SESSION_ABSOLUTE_LIFETIME_SECONDS:-86400}
      AUTH_SESSION_REFRESH_THRESHOLD_SECONDS: ${AUTH_SESSION_REFRESH_THRESHOLD_SECONDS:-1800}
      PYTHONPATH: /app/apps/api/src:/app/packages/core/src:/app/packages/plugin-sdk/src
    ports:
      - "${API_BIND_HOST:-127.0.0.1}:${API_PORT:-8000}:8000"
    volumes:
      - ./apps/api:/app/apps/api
      - ./packages/core:/app/packages/core
      - ./packages/plugin-sdk:/app/packages/plugin-sdk
      - ./runtime:/app/runtime
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
        required: false

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: quantagent-api:local
    command: ["quantagent-worker"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql+psycopg://quantagent:quantagent@db:5432/quantagent}
      RUNTIME_DIR: ${COMPOSE_RUNTIME_DIR:-/app/runtime}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-memory}
      EVENT_BUS_KAFKA_BOOTSTRAP_SERVERS: ${COMPOSE_EVENT_BUS_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      EVENT_BUS_KAFKA_CLIENT_ID: ${EVENT_BUS_KAFKA_CLIENT_ID:-quantagent-local}
      EVENT_BUS_KAFKA_DEFAULT_GROUP_ID: ${EVENT_BUS_KAFKA_DEFAULT_GROUP_ID:-quantagent-worker}
      EVENT_BUS_TOPIC_PREFIX: ${EVENT_BUS_TOPIC_PREFIX:-}
      MODEL_CONFIG_ENCRYPTION_KEY: ${MODEL_CONFIG_ENCRYPTION_KEY:-}
      PYTHONPATH: /app/apps/worker/src:/app/packages/core/src:/app/packages/plugin-sdk/src
    volumes:
      - ./apps/worker:/app/apps/worker
      - ./packages/core:/app/packages/core
      - ./packages/plugin-sdk:/app/packages/plugin-sdk
      - ./plugins:/app/plugins
      - ./runtime:/app/runtime
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
        required: false
      migrate:
        condition: service_completed_successfully
        required: false

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: quantagent-api:local
    command: ["quantagent-scheduler"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql+psycopg://quantagent:quantagent@db:5432/quantagent}
      RUNTIME_DIR: ${COMPOSE_RUNTIME_DIR:-/app/runtime}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
      EVENT_BUS_BACKEND: ${EVENT_BUS_BACKEND:-memory}
      EVENT_BUS_KAFKA_BOOTSTRAP_SERVERS: ${COMPOSE_EVENT_BUS_KAFKA_BOOTSTRAP_SERVERS:-kafka:9092}
      EVENT_BUS_KAFKA_CLIENT_ID: ${EVENT_BUS_KAFKA_CLIENT_ID:-quantagent-local}
      EVENT_BUS_KAFKA_DEFAULT_GROUP_ID: ${EVENT_BUS_KAFKA_DEFAULT_GROUP_ID:-quantagent-worker}
      EVENT_BUS_TOPIC_PREFIX: ${EVENT_BUS_TOPIC_PREFIX:-}
      PYTHONPATH: /app/apps/scheduler/src:/app/packages/core/src:/app/packages/plugin-sdk/src
    volumes:
      - ./apps/scheduler:/app/apps/scheduler
      - ./packages/core:/app/packages/core
      - ./packages/plugin-sdk:/app/packages/plugin-sdk
      - ./plugins:/app/plugins
      - ./runtime:/app/runtime
    depends_on:
      db:
        condition: service_healthy
      kafka:
        condition: service_healthy
        required: false
      migrate:
        condition: service_completed_successfully
        required: false

  migrate:
    image: quantagent-api:local
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    profiles:
      - migration
    working_dir: /app/packages/core
    command: ["quantagent-db", "upgrade"]
    environment:
      APP_ENV: ${APP_ENV:-local}
      DATABASE_URL: ${COMPOSE_DATABASE_URL:-postgresql+psycopg://quantagent:quantagent@db:5432/quantagent}
      RUNTIME_DIR: ${COMPOSE_RUNTIME_DIR:-/app/runtime}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:17
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-quantagent}
      POSTGRES_USER: ${POSTGRES_USER:-quantagent}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-quantagent}
    ports:
      - "${DB_HOST:-127.0.0.1}:${DB_PORT:-15432}:5432"
    volumes:
      - quantagent-db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -h 127.0.0.1 -p 5432 -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 10

  kafka:
    image: bitnami/kafka:4.0.0
    profiles:
      - kafka
    # 本地 Kafka profile 默认是易失运行时，不为 topic/offset 提供持久化卷。
    environment:
      KAFKA_CFG_NODE_ID: 0
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_CFG_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_CFG_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_CFG_NUM_PARTITIONS: 1
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server 127.0.0.1:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 12

volumes:
  quantagent-db:
