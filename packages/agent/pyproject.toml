[project]
name = "quantagent-agent"
version = "0.1.0"
description = "QuantAgent DeepAgents runtime infrastructure"
requires-python = ">=3.11"
dependencies = [
    "deepagents>=0.6.8,<0.7",
    "pydantic>=2.13.4",
    "pyyaml>=6.0.3",
]

[tool.uv.build-backend]
module-root = "src"
module-name = "quantagent.agent"

[build-system]
requires = ["uv_build>=0.11.14,<0.12"]
build-backend = "uv_build"
