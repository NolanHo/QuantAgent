[project]
name = "quantagent-core"
version = "0.1.0"
description = "Shared QuantAgent core infrastructure"
requires-python = ">=3.11"
dependencies = [
    "alembic>=1.17.2",
    "cryptography>=46.0.3",
    "pydantic-settings>=2.14.1",
    "psycopg[binary]>=3.3.2",
    "quantagent-plugin-sdk",
    "pyyaml>=6.0.3",
    "sqlalchemy>=2.0.44",
]

[project.optional-dependencies]
kafka = [
    "aiokafka>=0.12.0",
]

[project.scripts]
quantagent-db = "quantagent.core.db.cli:main"
quantagent-demo = "quantagent.core.demo:main"
quantagent-source-bindings = "quantagent.core.source_binding.cli:main"
quantagent-source-event-replay = "quantagent.core.replay.source_event_replay:main"

[tool.uv.sources]
quantagent-plugin-sdk = { workspace = true }

[tool.uv.build-backend]
module-root = "src"
module-name = "quantagent.core"

[build-system]
requires = ["uv_build>=0.11.14,<0.12"]
build-backend = "uv_build"
